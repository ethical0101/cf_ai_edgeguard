name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PAGES_PROJECT_NAME: cf-ai-edgeguard

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN in production environment secrets"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID in production environment secrets"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Use Wrangler v4
        run: npm install --no-save wrangler@4

      - name: Verify Wrangler authentication
        run: |
          npx wrangler whoami || {
            echo "Wrangler auth failed. Check CLOUDFLARE_API_TOKEN validity, account resource scope, and permissions."
            exit 1
          }

      - name: Type check
        run: npm run check

      - name: Deploy Worker
        run: npx wrangler deploy

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN in production environment secrets"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID in production environment secrets"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Use Wrangler v4
        run: npm install --no-save wrangler@4

      - name: Verify Wrangler authentication
        run: |
          npx wrangler whoami || {
            echo "Wrangler auth failed. Check CLOUDFLARE_API_TOKEN validity, account resource scope, and permissions."
            exit 1
          }

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main
